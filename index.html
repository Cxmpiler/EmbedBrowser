<script>
  const form = document.getElementById("controls");
  const urlInput = document.getElementById("url");
  const openNativeButton = document.getElementById("open-native");
  const currentUrl = document.getElementById("current-url");
  const status = document.getElementById("status");
  const frameWrap = document.getElementById("frame-wrap");

  function normalizeUrl(value) {
    const trimmed = String(value || "").trim();
    if (!trimmed) return "https://example.com";
    // Checks if it already starts with http:// or https://
    if (/^https?:\/\//i.test(trimmed)) return trimmed;
    return `https://${trimmed}`;
  }

  function setStatus(message) {
    status.textContent = message;
  }

  function setFrame(url) {
    currentUrl.textContent = url;
    frameWrap.innerHTML = "";
    const iframe = document.createElement("iframe");
    
    // Concatenating the worker and the normalized URL
    // Result: https://embedstuff.cxmplate.workers.dev/https://example.com
    iframe.src = "https://embedstuff.cxmplate.workers.dev/" + url;
    
    iframe.referrerPolicy = "no-referrer-when-downgrade";
    
    // Optional: add some styles to make sure it fills the container
    iframe.style.width = "100%";
    iframe.style.height = "100%";

    iframe.addEventListener("load", () => {
      setStatus("Embed loaded via proxy.");
    });
    
    iframe.addEventListener("error", () => {
      setStatus("Error loading the proxy. The worker might be down or the URL is invalid.");
    });

    frameWrap.appendChild(iframe);
  }

  form.addEventListener("submit", (event) => {
    event.preventDefault();
    const url = normalizeUrl(urlInput.value);
    setStatus("Trying embed through worker...");
    setFrame(url);
  });

  openNativeButton.addEventListener("click", () => {
    const url = normalizeUrl(urlInput.value);
    window.open(url, "_blank", "noopener,noreferrer");
    setStatus("Opened in a real browser tab.");
  });
</script>
