<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Site Launcher</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0f1115;
        --panel: #181c23;
        --panel-2: #202632;
        --line: #313949;
        --text: #f5f7fb;
        --muted: #aab4c5;
        --accent: #62a6ff;
        --accent-2: #6ce0b3;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; padding: 0; min-height: 100%;
        font-family: "Segoe UI", Tahoma, sans-serif;
        background: radial-gradient(circle at top left, rgba(98,166,255,0.1), transparent 24%), var(--bg);
        color: var(--text);
      }
      body { padding: 20px; }
      main { width: min(1200px, 100%); margin: 0 auto; display: grid; gap: 15px; }
      .toolbar, .viewport { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; }
      .toolbar { padding: 20px; display: grid; gap: 15px; }
      .controls { display: grid; grid-template-columns: 1fr auto auto; gap: 10px; }
      input { background: #10141b; border: 1px solid var(--line); border-radius: 8px; color: #fff; padding: 12px; font: inherit; }
      button { padding: 0 20px; height: 48px; border-radius: 8px; border: 1px solid var(--line); cursor: pointer; background: var(--panel-2); color: #fff; }
      button.primary { border-color: var(--accent); background: rgba(98, 166, 255, 0.1); }
      .viewport { min-height: 70vh; display: flex; flex-direction: column; overflow: hidden; }
      .viewport-bar { padding: 10px 15px; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; font-size: 0.9rem; }
      iframe { flex-grow: 1; border: 0; background: white; width: 100%; height: 100%; }
      .empty { padding: 40px; text-align: center; color: var(--muted); }
      @media (max-width: 600px) { .controls { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <main>
      <section class="toolbar">
        <h1>Site Launcher</h1>
        <form id="controls" class="controls">
          <input id="url" type="text" placeholder="https://google.com" value="https://example.com" />
          <button class="primary" type="submit">Embed Site</button>
          <button id="open-native" type="button">New Tab</button>
        </form>
      </section>

      <section class="viewport">
        <div class="viewport-bar">
          <span id="current-url">Ready</span>
          <span id="status">Idle</span>
        </div>
        <div id="frame-wrap" class="empty">Enter a URL to begin.</div>
      </section>
    </main>

    <script>
      const urlInput = document.getElementById("url");
      const status = document.getElementById("status");
      const frameWrap = document.getElementById("frame-wrap");
      const currentUrlDisplay = document.getElementById("current-url");

      function normalizeUrl(value) {
        let trimmed = value.trim();
        if (!/^https?:\/\//i.test(trimmed)) trimmed = "https://" + trimmed;
        return trimmed;
      }

      function setFrame(targetUrl) {
        currentUrlDisplay.textContent = targetUrl;
        status.textContent = "Loading...";
        frameWrap.innerHTML = "";
        
        const iframe = document.createElement("iframe");
        // IMPORTANT: We use encodeURIComponent so the target URL is treated as one single string
        const proxyUrl = "https://embedstuff.cxmplate.workers.dev/?url=" + encodeURIComponent(targetUrl);
        
        iframe.src = proxyUrl;
        iframe.onload = () => status.textContent = "Loaded";
        frameWrap.appendChild(iframe);
      }

      document.getElementById("controls").onsubmit = (e) => {
        e.preventDefault();
        setFrame(normalizeUrl(urlInput.value));
      };

      document.getElementById("open-native").onclick = () => {
        window.open(normalizeUrl(urlInput.value), "_blank");
      };
    </script>
  </body>
</html>
